# task config
task: HumanFreeFly

# simulation config
sim_freq: 200
agent_interaction_steps: 40 # step 0.2s

# termination config
max_steps: 1000             # episode length: 200s
altitude_limit: 2500
acceleration_limit_x: 10.0
acceleration_limit_y: 10.0
acceleration_limit_z: 10.0

# aircraft config
aircraft_configs: {
  A0100: {
    color: Red,
    model: f16,
    max_heading_increment: 180,       # degree
    max_altitude_increment: 7000,     # feet
    max_velocities_u_increment: 100,  # meter
    check_interval: 30,               # second
    init_state: {
      ic_long_gc_deg: 103.94,
      ic_lat_geod_deg: 30.69,
      ic_h_sl_ft: 0, # 20000
      ic_psi_true_deg: 0.0,
      ic_u_fps: 0.0, # 800.0
      ic_v_fps: 0.0,
      ic_w_fps: 0.0,
    }
  }
}
# (lontitude, latitude, altitude)
battle_field_center: [103.94, 30.69, 0.0] # [103.94, 30.69, 10000.0]

# reward config
AltitudeReward_safe_altitude: 4.0
AltitudeReward_danger_altitude: 3.5
AltitudeReward_Kv: 0.2
